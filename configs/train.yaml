project:
  root: .

data:
  bin_file: data/processed/tinystories_train_ids.bin
  idx_file: data/processed/tinystories_train_ids.idx
  dtype: uint16
  seq_len: 512

tokenizer:
  file: artifacts/tokenizer/tinystories_bpe.json
  vocab_size: 16000

train:
  out_dir: artifacts/checkpoints
  run_name: gpt_tinystories_cpu

  seed: 1337
  device: cpu
  num_workers: 0

  # optimization
  batch_size: 8          # CPU: start small
  grad_accum_steps: 4    # effective batch = 32 sequences
  lr: 3.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  grad_clip: 1.0

  max_steps: 20000
  log_every: 50
  eval_every: 1000
  save_every: 1000

  # evaluation: take a small fixed number of batches
  eval_batches: 20

model:
  # CPU-friendly tiny GPT
  d_model: 256
  n_layers: 6
  n_heads: 8
  d_ff: 1024
  dropout: 0.1
  tie_embeddings: true